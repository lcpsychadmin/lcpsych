<button class="settings-nav__mobile-toggle" type="button" data-settings-nav-toggle aria-expanded="false" aria-controls="seo-nav">Menu ▾</button>

<nav id="seo-nav" class="settings-nav" data-settings-nav>
  <h2 class="nav-heading">SEO Intelligence</h2>
  <p class="nav-subtitle">Jump to a section.</p>
  <ul class="nav-list">
    <li><a class="{% if active_page == 'control_panel' %}is-active{% endif %}" href="{% url 'seo_intel:control_panel' %}">Control Panel</a></li>
    <li><a class="{% if active_page == 'settings' %}is-active{% endif %}" href="{% url 'seo_intel:settings' %}">Settings</a></li>
    <li class="nav-tree {% if active_page == 'competitors' or active_page == 'keywords' %}{% else %}is-collapsed{% endif %}" data-collapsible>
      <button type="button" class="nav-tree__toggle" data-collapsible-toggle aria-expanded="{% if active_page == 'competitors' or active_page == 'keywords' %}true{% else %}false{% endif %}" aria-controls="nav-tree-data">Data Sources <span class="nav-tree__chevron">▸</span></button>
      <ul id="nav-tree-data" class="nav-tree__items">
        <li><a class="{% if active_page == 'competitors' %}is-active{% endif %}" href="{% url 'seo_intel:competitors' %}">Competitor Domains</a></li>
        <li><a class="{% if active_page == 'keywords' %}is-active{% endif %}" href="{% url 'seo_intel:keywords' %}">Keyword Seeds</a></li>
      </ul>
    </li>
    <li class="nav-tree {% if active_page == 'analytics_sc' or active_page == 'analytics_internal' or active_page == 'analytics_dead_urls' or active_page == 'analytics_gaps' or active_page == 'content_gaps' or active_page == 'keyword_universe' or active_page == 'serp_explorer' or active_page == 'analytics_hub' %}{% else %}is-collapsed{% endif %}" data-collapsible>
      <button type="button" class="nav-tree__toggle" data-collapsible-toggle aria-expanded="{% if active_page == 'analytics_sc' or active_page == 'analytics_internal' or active_page == 'analytics_dead_urls' or active_page == 'analytics_gaps' or active_page == 'content_gaps' or active_page == 'keyword_universe' or active_page == 'serp_explorer' or active_page == 'analytics_hub' %}true{% else %}false{% endif %}" aria-controls="nav-tree-analytics">Analytics <span class="nav-tree__chevron">▸</span></button>
      <ul id="nav-tree-analytics" class="nav-tree__items">
        <li><a class="{% if active_page == 'analytics_hub' %}is-active{% endif %}" href="{% url 'seo_intel:analytics_hub' %}">Analytics Hub</a></li>
        <li><a class="{% if active_page == 'analytics_sc' %}is-active{% endif %}" href="{% url 'seo_intel:analytics_sc' %}">Search Console</a></li>
        <li><a class="{% if active_page == 'analytics_internal' %}is-active{% endif %}" href="{% url 'seo_intel:analytics_internal' %}">Internal Search</a></li>
        <li><a class="{% if active_page == 'analytics_dead_urls' %}is-active{% endif %}" href="{% url 'seo_intel:analytics_dead_urls' %}">Dead URLs</a></li>
        <li><a class="{% if active_page == 'content_gaps' or active_page == 'analytics_gaps' %}is-active{% endif %}" href="{% url 'seo_intel:content_gaps' %}">Content Gaps</a></li>
        <li><a class="{% if active_page == 'keyword_universe' %}is-active{% endif %}" href="{% url 'seo_intel:keyword_universe' %}">Keyword Universe</a></li>
        <li><a class="{% if active_page == 'serp_explorer' %}is-active{% endif %}" href="{% url 'seo_intel:serp_explorer' %}">SERP Explorer</a></li>
      </ul>
    </li>
  </ul>

  <script>
    (function() {
      var trees = document.querySelectorAll('[data-collapsible]');
      trees.forEach(function(tree) {
        var btn = tree.querySelector('[data-collapsible-toggle]');
        if (!btn) return;
        btn.addEventListener('click', function() {
          var isCollapsed = tree.classList.toggle('is-collapsed');
          btn.setAttribute('aria-expanded', String(!isCollapsed));
        });
      });
      var toggle = document.querySelector('[data-settings-nav-toggle]');
      var nav = document.querySelector('[data-settings-nav]');
      if (toggle && nav) {
        toggle.addEventListener('click', function() {
          var isOpen = nav.classList.toggle('is-open');
          toggle.setAttribute('aria-expanded', String(isOpen));
        });
      }
    })();
  </script>
</nav>
